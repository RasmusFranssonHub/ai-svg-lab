<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bullens Pilsnerchips</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

    <!-- ============= HEADER ============== -->
    <!-- =================================== -->
  <header class="header">
    <div class="logo">
      <img src="./src/assets/066b50ba-8ea9-4669-9d25-0a4ff29764af 1.svg" alt="Bullens Logo" />
    </div>

    <nav class="nav">
      <a href="#">OM PRODUKTEN</a>
      <a href="#">HISTORIEN</a>
      <a href="#" class="btn-order">BESTÄLL NU</a>
    </nav>
  </header>

    <!-- ========== MAIN CONTENT =========== -->
    <!-- =================================== -->

    <!-- Background effects -->
    <div class="bg-overlay"></div>

    <!-- Main content -->
    <section class="hero-content">

      <h1 class="hero-title">

        <!-- Yellow neon -->
        <span class="neon yellow-wrap">
          <span class="yellow-blur">NU ÄVEN SOM</span>
          <span class="yellow-core">NU ÄVEN SOM</span>
        </span>

        <!-- Red neon -->
        <span class="neon red-wrap">
          <span class="red-blur">CHIPS</span>
          <span class="red-core">CHIPS</span>
        </span>

      </h1>

      <p class="hero-subtitle">
        EN SVENSK KLASSIKER I NY FORM
      </p>

    </section>

    <!-- ============= FOOTER ============== -->
    <!-- =================================== -->

    <footer class="hero-footer">
      <!-- Bottom left text -->
      <div class="bottom-left">
        <p>ETT ORIGINAL SEDAN 1957</p>
      </div>

      <!-- Socials -->
      <div class="socials">
        <a href="#"><img src="./src/assets/icons/instagram.svg" alt="Instagram" /></a>
        <a href="#"><img src="./src/assets/icons/facebook.svg" alt="Facebook" /></a>
        <a href="#"><img src="./src/assets/icons/linkedin.svg" alt="LinkedIn" /></a>
      </div>
    </footer>

  </main>

    <!-- =============== JS ================ -->
    <!-- =================================== -->
  <script type="module" src="/src/main.js"></script>
</body>
</html>
