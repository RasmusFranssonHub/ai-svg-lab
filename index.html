<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bullens Pilsnerchips</title>
</head>
<body>

    <!-- ============= HEADER ============== -->
    <!-- =================================== -->
  <header class="header">
    <div class="logo">
      <img src="./src/assets/066b50ba-8ea9-4669-9d25-0a4ff29764af 1.svg" alt="Bullens Logo" />
    </div>

    <nav class="nav">
      <a href="#">OM PRODUKTEN</a>
      <a href="#">HISTORIEN</a>
      <a href="#" class="btn-order">BESTÄLL NU</a>
    </nav>
  </header>

  
    <!-- ========== MAIN CONTENT =========== -->
    <!-- =================================== -->

    <!-- Background effects -->
    <div class="bg-overlay"></div>

    <!-- H1 + Chips Animation + p -->
    <section class="hero-content">

      <div class="hero-title">

          <!-- ============Yellow static =========== -->
          <!-- ===================================== -->
        <div class="title-top">
          <img src="./src/assets/neon/now-red.svg" alt="Yellow Static" />
        </div>

          <!-- ==========Chips animation stack ========== -->
          <!-- ========================================= -->
        <div class="chips-wrap">

          <!-- Yellow chips -->
          <div class="chips-yellow">
            <img src="./src/assets/neon/chips-yellow.svg" alt="Yellow Chips" />
          </div>

          <!-- Red chips -->
          <div class="chips-red">
            <img src="./src/assets/neon/chips-red.svg" alt="Red Chips" />
          </div>

        </div>

      </div>

      <p class="hero-subtitle">
        EN SVENSK KLASSIKER I NY FORM
      </p>

    </section>

    <!-- ============= FOOTER ============== -->
    <!-- =================================== -->

    <footer class="hero-footer">
      <!-- Bottom left text -->
      <div class="bottom-left">
        <p>ETT ORIGINAL SEDAN 1957</p>
      </div>

      <!-- Socials -->
      <div class="socials">
        <a href="#"><img src="./src/assets/icons/instagram.svg" alt="Instagram" /></a>
        <a href="#"><img src="./src/assets/icons/facebook.svg" alt="Facebook" /></a>
        <a href="#"><img src="./src/assets/icons/linkedin.svg" alt="LinkedIn" /></a>
      </div>
    </footer>

  </main>


    <!-- =============== JS ================ -->
    <!-- =================================== -->
  <script type="module" src="./src/main.js"></script>
</body>
</html>
